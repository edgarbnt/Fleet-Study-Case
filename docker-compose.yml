version: "3.9"

services:
  api:
    image: node:20-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development
      - BACKEND_PORT=${BACKEND_PORT:-4000}
      - DATABASE_FILE=${DATABASE_FILE:-/data/app.sqlite}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:${FRONTEND_PORT:-5173}}
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - db_data:/data
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    networks:
      - appnet

  web:
    image: node:20-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host --port ${FRONTEND_PORT:-5173}"
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - api
    networks:
      - appnet

  api-prod:
    profiles: ["prod"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - BACKEND_PORT=${BACKEND_PORT:-4000}
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_FILE=${DATABASE_FILE:-/data/app.sqlite}
    volumes:
      - db_data:/data
    expose:
      - "${BACKEND_PORT:-4000}"
    networks:
      - appnet

  web-prod:
    profiles: ["prod"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - api-prod
    networks:
      - appnet

volumes:
  db_data:
  backend_node_modules:
  frontend_node_modules:

networks:
  appnet:
    driver: bridge